<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEMOS | Sovereign Identity Platform</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="arctic-protocol">
    <div id="app">
        <!-- Dashboard Shell (Auth/Dash toggled via JS) -->
        <div id="auth-surface" class="view-shell hidden">
            <!-- Auth card injected here -->
        </div>

        <div id="dash-surface" class="view-shell">
            <aside class="sidebar">
                <div class="brand-header">
                    <h2 class="mono">MNEMOS</h2>
                    <span class="label-tech">Sovereign v4.0.1</span>
                </div>

                <nav class="nav-group">
                    <a class="nav-link active" data-tab="chat">_con_chat</a>
                    <a class="nav-link" data-tab="memory">_sem_memory</a>
                    <a class="nav-link" data-tab="lattice">_neu_lattice</a>
                    <a class="nav-link" data-tab="evolution">_sys_evolution</a>
                    <a class="nav-link" data-tab="identity">_bio_identity</a>
                </nav>

                <div class="nexus-vision">
                    <div class="label-tech"><span class="pulse-indicator"></span> Nexus Stream</div>
                    <div id="nexus-feed" class="mono" style="font-size: 0.65rem; margin-top: 12px; opacity: 0.6;">
                        Awaiting sensory ingestion...
                    </div>
                </div>

                <div class="sidebar-user" style="margin-top: 24px;">
                    <button id="logout-trigger" class="nav-link" style="border: none; background: none; width: 100%;">_log_terminate</button>
                </div>
            </aside>

            <main class="main-stage">
                <div id="view-mount">
                    <!-- Dynamic views injected here -->
                </div>
            </main>
        </div>

        <footer class="status-bar">
            <div class="status-left">
                <span id="latency-val">SYN: 0MS</span> | <span id="user-display">PENDING_IDENTITY</span>
            </div>
            <div class="status-right mono">
                MNEMOS_CORE_ACTIVE: TRUE
            </div>
        </footer>
    </div>

    <!-- Onboarding / Overlay Systems -->
    <div id="modal-container" class="hidden"></div>
    <div id="popover-container" class="hidden"></div>

    <script src="app.js" type="module"></script>
</body>
</html>
