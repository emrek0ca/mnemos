site_name: MNEMOS | Digital Virtual Brain
site_url: https://github.com/emrek0ca/mnemos
repo_url: https://github.com/emrek0ca/mnemos
author: emrek0ca

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        link: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Product Intent: PRODUCT_INTENT.md
  - Evolution Log: SESSION_LOG.md
  - Task Board: TASK_BOARD.md
  - Runbook: RUNBOOK.md
